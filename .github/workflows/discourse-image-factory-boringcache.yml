name: "Discourse Image Factory - BC"
run-name: >-
  ${{ format('{0} | {1}', github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'BC Rolling' || 'BC Fresh', github.event_name == 'schedule' && 'Weekly fresh benchmark' || github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      cache_lane:
        description: "Benchmark lane"
        required: false
        type: choice
        default: fresh
        options:
          - fresh
          - rolling
      buildkit_backend:
        description: "BoringCache BuildKit backend"
        required: false
        type: choice
        default: both
        options:
          - both
          - registry
          - auto
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}-${{ github.event_name == 'workflow_dispatch' && inputs.buildkit_backend || 'both' }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  benchmark:
    name: ${{ matrix.buildkit_backend == 'auto' && format('BC auto / {0}', matrix.image.label) || format('BC / {0}', matrix.image.label) }}
    strategy:
      fail-fast: false
      matrix:
        buildkit_backend: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.buildkit_backend == 'registry') && '["registry"]' || (github.event_name == 'workflow_dispatch' && inputs.buildkit_backend == 'auto') && '["auto"]' || '["registry","auto"]') }}
        image:
          - label: base deps
            benchmark_id: discourse-base-deps
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            image_tag: discourse-base-deps-benchmark:latest
            docker_build_args: |
              --target=discourse-build-base
          - label: base web
            benchmark_id: discourse-base-web-only
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            image_tag: discourse-base-web-only-benchmark:latest
            docker_build_args: |
              --target=discourse-web-only
              --build-arg=DISCOURSE_BRANCH=main
          - label: base release
            benchmark_id: discourse-base-release
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            image_tag: discourse-base-release-benchmark:latest
            docker_build_args: |
              --target=discourse-release
              --build-arg=DISCOURSE_BRANCH=main
          - label: test release
            benchmark_id: discourse-test-release
            dockerfile_path: docker-upstream/image/discourse_test/Dockerfile
            docker_context: docker-upstream/image/discourse_test
            image_tag: discourse-test-release-benchmark:latest
            docker_build_args: |
              --target=release
              --build-arg=from_tag=release
    uses: ./.github/workflows/reusable-docker-buildkit-benchmark.yml
    with:
      strategy: boringcache
      cache_lane: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
      buildkit_backend: ${{ matrix.buildkit_backend }}
      benchmark_id: ${{ matrix.buildkit_backend == 'auto' && format('{0}-auto', matrix.image.benchmark_id) || matrix.image.benchmark_id }}
      project_repo: discourse/discourse_docker
      dockerfile_path: ${{ matrix.image.dockerfile_path }}
      docker_context: ${{ matrix.image.docker_context }}
      docker_build_args: ${{ matrix.image.docker_build_args }}
      image_tag: ${{ matrix.image.image_tag }}
      cli_platform: linux-amd64
      benchmark_workspace: ${{ github.repository }}
    secrets: inherit
    permissions:
      contents: read
      actions: write
