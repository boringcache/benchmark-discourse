name: "Discourse Docker Benchmark"
run-name: >-
  ${{ format('Benchmark Rolling | {0}', github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.event_name == 'schedule' && 'Scheduled' || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      prewarm_buildkit_image:
        description: "Optional experimental BuildKit image. When set with prewarm_cli_image, the rolling run adds a BC BuildKit backend lane."
        required: false
        type: string
        default: ""
      prewarm_cli_image:
        description: "Optional experimental Linux BoringCache CLI image. Used only by the experimental BuildKit lane."
        required: false
        type: string
        default: ""
  schedule:
    - cron: "17 3 * * 0"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/actions/docker-rolling-benchmark/**"
      - ".github/workflows/discourse-docker-benchmark.yml"
      - ".github/workflows/reusable-docker-buildkit-benchmark.yml"
      - "README.md"
      - "benchmark/**"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"
      - "docker-upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  packages: read

jobs:
  github-actions-cache:
    name: GHA
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: discourse-docker
          project_repo: discourse/discourse
          dockerfile_path: benchmark/discourse-dev.Dockerfile
          docker_context: .
          image_tag: discourse-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"

  ecr-cache:
    name: ECR
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: ECR
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: ecr-cache
          benchmark_id: discourse-docker
          project_repo: discourse/discourse
          dockerfile_path: benchmark/discourse-dev.Dockerfile
          docker_context: .
          image_tag: discourse-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          ecr_region: ${{ vars.DOCKER_BENCHMARK_ECR_REGION || 'us-east-1' }}
          ecr_role_arn: ${{ vars.DOCKER_BENCHMARK_ECR_ROLE_ARN }}
          ecr_registry: ${{ vars.DOCKER_BENCHMARK_ECR_REGISTRY }}
          ecr_repository: ${{ vars.DOCKER_BENCHMARK_ECR_REPOSITORY }}

  boringcache-oci:
    name: BC
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: discourse-docker
          project_repo: discourse/discourse
          dockerfile_path: benchmark/discourse-dev.Dockerfile
          docker_context: .
          image_tag: discourse-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"

  boringcache-native:
    name: BC native
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC native
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: native
          benchmark_id: discourse-docker-native
          project_repo: discourse/discourse
          dockerfile_path: benchmark/discourse-dev.Dockerfile
          docker_context: .
          image_tag: discourse-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"

  boringcache-buildkit-backend:
    name: BC BuildKit Backend
    if: ${{ github.event_name != 'pull_request' && (inputs.prewarm_buildkit_image || vars.DISCOURSE_PREWARM_BUILDKIT_IMAGE) && (inputs.prewarm_cli_image || vars.DISCOURSE_PREWARM_CLI_IMAGE) }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC BuildKit Backend
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: discourse-docker-bc-buildkit
          project_repo: discourse/discourse
          dockerfile_path: benchmark/discourse-dev.Dockerfile
          docker_context: .
          image_tag: discourse-benchmark:latest
          cli_platform: linux-amd64
          cli_image: ${{ inputs.prewarm_cli_image || vars.DISCOURSE_PREWARM_CLI_IMAGE }}
          buildkit_image: ${{ inputs.prewarm_buildkit_image || vars.DISCOURSE_PREWARM_BUILDKIT_IMAGE }}
          benchmark_workspace: ${{ github.repository }}
          cache_export_type: boringcache
          submodules: "upstream docker-upstream"
