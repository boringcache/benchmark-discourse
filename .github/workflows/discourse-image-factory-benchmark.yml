name: "Discourse Image Factory Benchmark"
run-name: >-
  ${{ format('Benchmark Rolling | {0}', github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.event_name == 'schedule' && 'Scheduled' || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * 0"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/actions/docker-rolling-benchmark/**"
      - ".github/workflows/discourse-image-factory-benchmark.yml"
      - ".github/workflows/reusable-docker-buildkit-benchmark.yml"
      - "README.md"
      - "benchmark/**"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"
      - "docker-upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  gha-base-deps:
    name: GHA / base deps
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: discourse-base-deps
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-build-base
          image_tag: discourse-base-deps-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  gha-base-web:
    name: GHA / base web
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: discourse-base-web-only
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-web-only
            --build-arg=DISCOURSE_BRANCH=main
          image_tag: discourse-base-web-only-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  gha-base-release:
    name: GHA / base release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: discourse-base-release
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-release
            --build-arg=DISCOURSE_BRANCH=main
          image_tag: discourse-base-release-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  gha-test-release:
    name: GHA / test release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: discourse-test-release
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/discourse_test/Dockerfile
          docker_context: docker-upstream/image/discourse_test
          docker_build_args: |
            --target=release
            --build-arg=from_tag=discourse/base:release
          image_tag: discourse-test-release-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  bc-base-deps:
    name: BC OCI / base deps
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC OCI
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: discourse-base-deps
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-build-base
          image_tag: discourse-base-deps-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  bc-base-web:
    name: BC OCI / base web
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC OCI
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: discourse-base-web-only
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-web-only
            --build-arg=DISCOURSE_BRANCH=main
          image_tag: discourse-base-web-only-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  bc-base-release:
    name: BC OCI / base release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC OCI
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: discourse-base-release
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-release
            --build-arg=DISCOURSE_BRANCH=main
          image_tag: discourse-base-release-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  bc-test-release:
    name: BC OCI / test release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC OCI
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: discourse-test-release
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/discourse_test/Dockerfile
          docker_context: docker-upstream/image/discourse_test
          docker_build_args: |
            --target=release
            --build-arg=from_tag=discourse/base:release
          image_tag: discourse-test-release-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream
