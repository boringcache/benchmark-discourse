name: "Discourse Image Factory Benchmark"
run-name: >-
  ${{ format('Benchmark Rolling | {0}', github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.event_name == 'schedule' && 'Scheduled' || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      cli_ref:
        description: "Internal benchmark diagnostic only: build this boringcache/cli ref instead of using the released CLI"
        required: false
        type: string
      blob_download_concurrency:
        description: "Optional BORINGCACHE_BLOB_DOWNLOAD_CONCURRENCY override (blank = adaptive)"
        required: false
        type: string
      blob_prefetch_concurrency:
        description: "Optional BORINGCACHE_BLOB_PREFETCH_CONCURRENCY override (blank = match download concurrency)"
        required: false
        type: string
      oci_stream_through_min_bytes:
        description: "Optional BORINGCACHE_OCI_STREAM_THROUGH_MIN_BYTES for Docker/OCI large blobs (blank = disabled)"
        required: false
        type: string
  schedule:
    - cron: "37 3 * * 0"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/actions/docker-rolling-benchmark/**"
      - ".github/workflows/discourse-image-factory-benchmark.yml"
      - ".github/workflows/reusable-docker-buildkit-benchmark.yml"
      - "README.md"
      - "benchmark/**"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"
      - "docker-upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  github-actions-cache:
    name: ${{ format('Build {0} with GitHub Actions Cache', matrix.image.label) }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        image:
          - label: base deps
            benchmark_id: discourse-base-deps
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            image_tag: discourse-base-deps-benchmark:latest
            docker_build_args: |
              --target=discourse-build-base
          - label: base web only
            benchmark_id: discourse-base-web-only
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            image_tag: discourse-base-web-only-benchmark:latest
            docker_build_args: |
              --target=discourse-web-only
              --build-arg=DISCOURSE_BRANCH=main
          - label: base release
            benchmark_id: discourse-base-release
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            image_tag: discourse-base-release-benchmark:latest
            docker_build_args: |
              --target=discourse-release
              --build-arg=DISCOURSE_BRANCH=main
          - label: test release
            benchmark_id: discourse-test-release
            dockerfile_path: docker-upstream/image/discourse_test/Dockerfile
            docker_context: docker-upstream/image/discourse_test
            image_tag: discourse-test-release-benchmark:latest
            docker_build_args: |
              --target=release
              --build-arg=from_tag=release
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: ${{ matrix.image.benchmark_id }}
          project_repo: discourse/discourse_docker
          dockerfile_path: ${{ matrix.image.dockerfile_path }}
          docker_context: ${{ matrix.image.docker_context }}
          docker_build_args: ${{ matrix.image.docker_build_args }}
          image_tag: ${{ matrix.image.image_tag }}
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  boringcache-oci:
    name: ${{ format('Build {0} with BoringCache OCI', matrix.image.label) }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        image:
          - label: base deps
            benchmark_id: discourse-base-deps
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            image_tag: discourse-base-deps-benchmark:latest
            docker_build_args: |
              --target=discourse-build-base
          - label: base web only
            benchmark_id: discourse-base-web-only
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            image_tag: discourse-base-web-only-benchmark:latest
            docker_build_args: |
              --target=discourse-web-only
              --build-arg=DISCOURSE_BRANCH=main
          - label: base release
            benchmark_id: discourse-base-release
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            image_tag: discourse-base-release-benchmark:latest
            docker_build_args: |
              --target=discourse-release
              --build-arg=DISCOURSE_BRANCH=main
          - label: test release
            benchmark_id: discourse-test-release
            dockerfile_path: docker-upstream/image/discourse_test/Dockerfile
            docker_context: docker-upstream/image/discourse_test
            image_tag: discourse-test-release-benchmark:latest
            docker_build_args: |
              --target=release
              --build-arg=from_tag=release
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: ${{ matrix.image.benchmark_id }}
          project_repo: discourse/discourse_docker
          dockerfile_path: ${{ matrix.image.dockerfile_path }}
          docker_context: ${{ matrix.image.docker_context }}
          docker_build_args: ${{ matrix.image.docker_build_args }}
          image_tag: ${{ matrix.image.image_tag }}
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          cli_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.cli_ref || '' }}
          cli_source_token: ${{ secrets.CLI_SOURCE_GITHUB_TOKEN || secrets.CLI_RELEASE_GITHUB_TOKEN || '' }}
          blob_download_concurrency: ${{ github.event_name == 'workflow_dispatch' && inputs.blob_download_concurrency || '' }}
          blob_prefetch_concurrency: ${{ github.event_name == 'workflow_dispatch' && inputs.blob_prefetch_concurrency || '' }}
          oci_stream_through_min_bytes: ${{ github.event_name == 'workflow_dispatch' && inputs.oci_stream_through_min_bytes || '' }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  boringcache-auto:
    name: ${{ format('Build {0} with BoringCache Auto', matrix.image.label) }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        image:
          - label: base deps
            benchmark_id: discourse-base-deps-auto
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            image_tag: discourse-base-deps-benchmark:latest
            docker_build_args: |
              --target=discourse-build-base
          - label: base web only
            benchmark_id: discourse-base-web-only-auto
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            image_tag: discourse-base-web-only-benchmark:latest
            docker_build_args: |
              --target=discourse-web-only
              --build-arg=DISCOURSE_BRANCH=main
          - label: base release
            benchmark_id: discourse-base-release-auto
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            image_tag: discourse-base-release-benchmark:latest
            docker_build_args: |
              --target=discourse-release
              --build-arg=DISCOURSE_BRANCH=main
          - label: test release
            benchmark_id: discourse-test-release-auto
            dockerfile_path: docker-upstream/image/discourse_test/Dockerfile
            docker_context: docker-upstream/image/discourse_test
            image_tag: discourse-test-release-benchmark:latest
            docker_build_args: |
              --target=release
              --build-arg=from_tag=release
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC auto
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: auto
          benchmark_id: ${{ matrix.image.benchmark_id }}
          project_repo: discourse/discourse_docker
          dockerfile_path: ${{ matrix.image.dockerfile_path }}
          docker_context: ${{ matrix.image.docker_context }}
          docker_build_args: ${{ matrix.image.docker_build_args }}
          image_tag: ${{ matrix.image.image_tag }}
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          cli_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.cli_ref || '' }}
          cli_source_token: ${{ secrets.CLI_SOURCE_GITHUB_TOKEN || secrets.CLI_RELEASE_GITHUB_TOKEN || '' }}
          blob_download_concurrency: ${{ github.event_name == 'workflow_dispatch' && inputs.blob_download_concurrency || '' }}
          blob_prefetch_concurrency: ${{ github.event_name == 'workflow_dispatch' && inputs.blob_prefetch_concurrency || '' }}
          oci_stream_through_min_bytes: ${{ github.event_name == 'workflow_dispatch' && inputs.oci_stream_through_min_bytes || '' }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream
