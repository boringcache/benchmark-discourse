    name: BC native / test release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC native
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: native
          benchmark_id: discourse-test-release-native
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/discourse_test/Dockerfile
          docker_context: docker-upstream/image/discourse_test
          docker_build_args: |
            --target=release
            --build-arg=from_tag=release
          image_tag: discourse-test-release-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream
