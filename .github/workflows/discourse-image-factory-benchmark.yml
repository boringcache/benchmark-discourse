name: "Discourse Image Factory Benchmark"
run-name: >-
  ${{ format('Benchmark Rolling | {0}', github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.event_name == 'schedule' && 'Scheduled' || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * 0"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/actions/docker-rolling-benchmark/**"
      - ".github/workflows/discourse-image-factory-benchmark.yml"
      - ".github/workflows/reusable-docker-buildkit-benchmark.yml"
      - "README.md"
      - "benchmark/**"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"
      - "docker-upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  gha-base-deps:
    name: GHA / base deps
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: discourse-base-deps
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-build-base
          image_tag: discourse-base-deps-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  gha-base-web:
    name: GHA / base web
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: discourse-base-web-only
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-web-only
            --build-arg=DISCOURSE_BRANCH=main
          image_tag: discourse-base-web-only-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  gha-base-release:
    name: GHA / base release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: discourse-base-release
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-release
            --build-arg=DISCOURSE_BRANCH=main
          image_tag: discourse-base-release-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  gha-test-release:
    name: GHA / test release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: discourse-test-release
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/discourse_test/Dockerfile
          docker_context: docker-upstream/image/discourse_test
          docker_build_args: |
            --target=release
            --build-arg=from_tag=release
          image_tag: discourse-test-release-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  ecr-cache:
    name: ECR / ${{ matrix.label }}
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: base deps
            benchmark_id: discourse-base-deps
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            docker_build_args: |
              --target=discourse-build-base
            image_tag: discourse-base-deps-benchmark:latest
          - label: base web
            benchmark_id: discourse-base-web-only
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            docker_build_args: |
              --target=discourse-web-only
              --build-arg=DISCOURSE_BRANCH=main
            image_tag: discourse-base-web-only-benchmark:latest
          - label: base release
            benchmark_id: discourse-base-release
            dockerfile_path: docker-upstream/image/base/Dockerfile
            docker_context: docker-upstream/image/base
            docker_build_args: |
              --target=discourse-release
              --build-arg=DISCOURSE_BRANCH=main
            image_tag: discourse-base-release-benchmark:latest
          - label: test release
            benchmark_id: discourse-test-release
            dockerfile_path: docker-upstream/image/discourse_test/Dockerfile
            docker_context: docker-upstream/image/discourse_test
            docker_build_args: |
              --target=release
              --build-arg=from_tag=release
            image_tag: discourse-test-release-benchmark:latest
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: ECR
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: ecr-cache
          benchmark_id: ${{ matrix.benchmark_id }}
          project_repo: discourse/discourse_docker
          dockerfile_path: ${{ matrix.dockerfile_path }}
          docker_context: ${{ matrix.docker_context }}
          docker_build_args: ${{ matrix.docker_build_args }}
          image_tag: ${{ matrix.image_tag }}
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream
          ecr_region: ${{ vars.DOCKER_BENCHMARK_ECR_REGION || 'us-east-1' }}
          ecr_role_arn: ${{ vars.DOCKER_BENCHMARK_ECR_ROLE_ARN }}
          ecr_registry: ${{ vars.DOCKER_BENCHMARK_ECR_REGISTRY }}
          ecr_repository: ${{ vars.DOCKER_BENCHMARK_ECR_REPOSITORY }}

  bc-base-deps:
    name: BC / base deps
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: discourse-base-deps
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-build-base
          image_tag: discourse-base-deps-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  bc-base-web:
    name: BC / base web
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: discourse-base-web-only
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-web-only
            --build-arg=DISCOURSE_BRANCH=main
          image_tag: discourse-base-web-only-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  bc-base-release:
    name: BC / base release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: discourse-base-release
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-release
            --build-arg=DISCOURSE_BRANCH=main
          image_tag: discourse-base-release-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  bc-test-release:
    name: BC / test release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: discourse-test-release
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/discourse_test/Dockerfile
          docker_context: docker-upstream/image/discourse_test
          docker_build_args: |
            --target=release
            --build-arg=from_tag=release
          image_tag: discourse-test-release-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  bc-native-base-deps:
    name: BC native / base deps
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC native
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: native
          benchmark_id: discourse-base-deps-native
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-build-base
          image_tag: discourse-base-deps-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  bc-native-base-web:
    name: BC native / base web
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC native
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: native
          benchmark_id: discourse-base-web-only-native
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-web-only
            --build-arg=DISCOURSE_BRANCH=main
          image_tag: discourse-base-web-only-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          submodules: "upstream docker-upstream"
          project_ref_submodule: docker-upstream

  bc-native-base-release:
    name: BC native / base release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC native
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: native
          benchmark_id: discourse-base-release-native
          project_repo: discourse/discourse_docker
          dockerfile_path: docker-upstream/image/base/Dockerfile
          docker_context: docker-upstream/image/base
          docker_build_args: |
            --target=discourse-release
            --build-arg=DISCOURSE_BRANCH=main
          image_tag: discourse-base-release-benchmark:latest
          cli_platform: linux-amd64
