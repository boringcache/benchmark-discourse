name: "Discourse Docker - BC"
run-name: >-
  ${{ format('{0} | {1}', github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'BC Rolling' || 'BC Fresh', github.event_name == 'schedule' && 'Weekly fresh benchmark' || github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      cache_lane:
        description: "Benchmark lane"
        required: false
        type: choice
        default: fresh
        options:
          - fresh
          - rolling
      buildkit_backend:
        description: "BoringCache BuildKit backend"
        required: false
        type: choice
        default: both
        options:
          - both
          - registry
          - auto
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}-${{ github.event_name == 'workflow_dispatch' && inputs.buildkit_backend || 'both' }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  benchmark:
    name: ${{ matrix.buildkit_backend == 'auto' && 'BC auto' || 'BC' }}
    strategy:
      fail-fast: false
      matrix:
        buildkit_backend: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.buildkit_backend == 'registry') && '["registry"]' || (github.event_name == 'workflow_dispatch' && inputs.buildkit_backend == 'auto') && '["auto"]' || '["registry","auto"]') }}
    uses: ./.github/workflows/reusable-docker-buildkit-benchmark.yml
    with:
      strategy: boringcache
      cache_lane: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
      buildkit_backend: ${{ matrix.buildkit_backend }}
      benchmark_id: ${{ matrix.buildkit_backend == 'auto' && 'discourse-docker-auto' || 'discourse-docker' }}
      project_repo: discourse/discourse
      dockerfile_path: benchmark/discourse-dev.Dockerfile
      docker_context: .
      image_tag: discourse-benchmark:latest
      cli_platform: linux-amd64
      benchmark_workspace: ${{ github.repository }}
    secrets: inherit
    permissions:
      contents: read
      actions: write
