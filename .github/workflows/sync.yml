name: "Sync Upstream"

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: benchmark-discourse-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync With Upstream
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.BOT_PUBLIC_GITHUB_TOKEN }}

      - name: Sync upstream submodules
        run: |
          set -euo pipefail
          git config --global user.name "boringcache-bot"
          git config --global user.email "boringcache-bot@users.noreply.github.com"

          git submodule sync --recursive
          git submodule update --init --remote --merge upstream docker-upstream

          if git diff --quiet --submodule=short; then
            echo "No upstream changes"
            exit 0
          fi

          upstream_url="$(cd upstream && git remote get-url origin)"
          upstream_sha="$(cd upstream && git rev-parse HEAD)"
          docker_upstream_url="$(cd docker-upstream && git remote get-url origin)"
          docker_upstream_sha="$(cd docker-upstream && git rev-parse HEAD)"

          git add upstream docker-upstream
          git commit -m "Update upstreams to ${upstream_url}/commit/${upstream_sha} and ${docker_upstream_url}/commit/${docker_upstream_sha}"
          git push origin HEAD:main
