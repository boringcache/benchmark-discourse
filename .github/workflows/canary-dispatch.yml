name: "Canary Benchmark Dispatch"

on:
  workflow_dispatch:
    inputs:
      cli_version:
        description: "BoringCache CLI release tag to test."
        required: false
        type: string
        default: vcli-canary
      prewarm_buildkit_image:
        description: "BuildKit image to test for managed backend lanes."
        required: false
        type: string
        default: ghcr.io/boringcache/buildkit:canary
      benchmark_id_suffix:
        description: "Stable suffix for canary/cache scopes. Change only for isolated comparison runs."
        required: false
        type: string
        default: -canary

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  dispatch:
    name: Dispatch stable canary comparison
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispatch Discourse canary comparison
        env:
          GH_TOKEN: ${{ github.token }}
          CLI_VERSION: ${{ inputs.cli_version || vars.DISCOURSE_CANARY_CLI_VERSION || vars.BORINGCACHE_BENCHMARK_CLI_VERSION || 'vcli-canary' }}
          PREWARM_BUILDKIT_IMAGE: ${{ inputs.prewarm_buildkit_image || vars.DISCOURSE_PREWARM_BUILDKIT_IMAGE || 'ghcr.io/boringcache/buildkit:canary' }}
          BENCHMARK_ID_SUFFIX: ${{ inputs.benchmark_id_suffix || vars.DISCOURSE_CANARY_BENCHMARK_ID_SUFFIX || '-canary' }}
        run: |
          set -euo pipefail

          wait_for_cli_release() {
            local cli_version="$1"
            [[ -n "$cli_version" ]] || return 0

            local release_repo="${BORINGCACHE_CLI_RELEASE_REPOSITORY:-boringcache/cli}"
            local max_attempts="${BORINGCACHE_CLI_RELEASE_WAIT_ATTEMPTS:-60}"
            local attempt assets
            for attempt in $(seq 1 "$max_attempts"); do
              assets="$(gh release view "$cli_version" --repo "$release_repo" --json assets --jq '.assets[].name' 2>/dev/null || true)"
              if grep -Fxq boringcache-linux-amd64 <<< "$assets" && grep -Fxq SHA256SUMS <<< "$assets"; then
                echo "Found ${release_repo}@${cli_version} canary assets."
                return 0
              fi
              echo "::notice::Waiting for ${release_repo}@${cli_version} boringcache-linux-amd64 and SHA256SUMS (${attempt}/${max_attempts})"
              sleep 10
            done

            echo "::error::Timed out waiting for ${release_repo}@${cli_version} boringcache-linux-amd64 and SHA256SUMS." >&2
            exit 1
          }

          wait_for_cli_release "$CLI_VERSION"

          attempt=1
          max_attempts=3
          until gh workflow run discourse-docker-benchmark.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "${{ github.ref_name }}" \
            -f "cli_version=${CLI_VERSION}" \
            -f "prewarm_buildkit_image=${PREWARM_BUILDKIT_IMAGE}" \
            -f "benchmark_id_suffix=${BENCHMARK_ID_SUFFIX}"; do
            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "Failed to dispatch discourse-docker-benchmark.yml after ${attempt} attempts" >&2
              exit 1
            fi
            echo "Dispatch failed; retrying (${attempt}/${max_attempts})" >&2
            attempt=$((attempt + 1))
            sleep 5
          done
