name: "Rolling Benchmark Dispatch"

on:
  workflow_dispatch:
    inputs:
      run_docker:
        description: "Dispatch the Docker rolling benchmark pair"
        required: false
        type: boolean
        default: true
      run_image_factory:
        description: "Dispatch the discourse_docker image-factory rolling benchmark pair"
        required: false
        type: boolean
        default: true
      blob_download_concurrency:
        description: "Optional BORINGCACHE_BLOB_DOWNLOAD_CONCURRENCY override for the BoringCache run"
        required: false
        type: string
      blob_prefetch_concurrency:
        description: "Optional BORINGCACHE_BLOB_PREFETCH_CONCURRENCY override for the BoringCache run"
        required: false
        type: string
      oci_stream_through_min_bytes:
        description: "Optional BORINGCACHE_OCI_STREAM_THROUGH_MIN_BYTES for Docker/OCI BoringCache runs"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"
      - "docker-upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  dispatch-docker:
    name: Dispatch Docker rolling benchmark pair
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_docker }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch GitHub Actions Cache rolling lane
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "discourse-docker-actions-cache.yml" --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}" -f cache_lane=rolling

      - name: Dispatch BoringCache rolling lane
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh workflow run "discourse-docker-boringcache.yml" --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}"
          -f cache_lane=rolling
          -f blob_download_concurrency="${{ inputs.blob_download_concurrency || '' }}"
          -f blob_prefetch_concurrency="${{ inputs.blob_prefetch_concurrency || '' }}"
          -f oci_stream_through_min_bytes="${{ inputs.oci_stream_through_min_bytes || '' }}"

  dispatch-image-factory:
    name: Dispatch image-factory rolling benchmark pair
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_image_factory }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch GitHub Actions Cache image-factory rolling lane
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "discourse-image-factory-actions-cache.yml" --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}" -f cache_lane=rolling

      - name: Dispatch BoringCache image-factory rolling lane
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh workflow run "discourse-image-factory-boringcache.yml" --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}"
          -f cache_lane=rolling
          -f blob_download_concurrency="${{ inputs.blob_download_concurrency || '' }}"
          -f blob_prefetch_concurrency="${{ inputs.blob_prefetch_concurrency || '' }}"
          -f oci_stream_through_min_bytes="${{ inputs.oci_stream_through_min_bytes || '' }}"
