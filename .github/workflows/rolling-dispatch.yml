name: "Rolling Benchmark Dispatch"

on:
  workflow_dispatch:
    inputs:
      run_docker:
        description: "Dispatch the Docker rolling benchmark"
        required: false
        type: boolean
        default: true
      run_image_factory:
        description: "Dispatch the discourse_docker image-factory rolling benchmark"
        required: false
        type: boolean
        default: true
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"
      - "docker-upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  dispatch-docker:
    name: Dispatch Docker rolling benchmark
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_docker }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Docker rolling benchmark
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh workflow run "discourse-docker-benchmark.yml" --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}"

  dispatch-image-factory:
    name: Dispatch image-factory rolling benchmark
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_image_factory }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch image-factory rolling benchmark
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh workflow run "discourse-image-factory-benchmark.yml" --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}"
